<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: linear-gradient(to right, #ff9a9e, #fecfef);
    font-family: Arial;
    text-align: center;
    color: #fff;
}

.question-box {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

.question-img {
    width: 200px;
    border-radius: 20px;
    margin: 15px 0;
}

.btn {
    padding: 10px 25px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    margin: 10px;
}

.yes {
    background: #4CAF50;
    color: white;
    transition: 0.3s;
}

.no {
    background: red;
    color: white;
    transition: 0.3s;
}

.hidden {
    display: none;
}

.romantic {
    margin-top: 40px;
    font-size: 45px;
    font-family: 'Great Vibes', cursive;
    color: #ff4b6e;
}

.container {
    margin-top: 40px;
}

.left-img {
    position: fixed;
    left: 20px;
    bottom: 120px;
    width: 200px;
    border-radius: 20px;
}

.right-img {
    position: fixed;
    right: 20px;
    bottom: 120px;
    width: 200px;
    border-radius: 20px;
}

.media-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-top: 20px;
}

.bottom-img {
    width: 250px;
    border-radius: 20px;
    margin-top: 15px;
}

button {
    background: #ff4b6e;
    border: none;
    padding: 12px 25px;
    border-radius: 10px;
    color: white;
    cursor: pointer;
    margin: 10px;
}

.heart {
    position: absolute;
    color: red;
    animation: float 5s linear infinite;
}
@keyframes float {
    0% { transform: translateY(100vh); }
    100% { transform: translateY(-10vh); opacity: 0; }
}

/* الألعاب النارية */
.firework {
    position: fixed;
    width: 5px;
    height: 5px;
    background: transparent;
    pointer-events: none;
}

.firework::before {
    content: '';
    position: absolute;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    box-shadow:
        0 -50px red, 35px -35px yellow, 50px 0 orange,
        35px 35px pink, 0 50px blue, -35px 35px cyan,
        -50px 0 lime, -35px -35px purple;
    animation: explode 1s ease-out forwards;
}

@keyframes explode {
    0% { transform: scale(0.2); opacity: 1; }
    100% { transform: scale(2.5); opacity: 0; }
}
</style>

</head>
<body>

<div class="question-box" id="questionBox">

    <h2 style="color: red;">Do you love me? ❤️</h2>

    <img src="imge/flower.jpg" class="question-img">

    <br>

    <button class="btn yes" id="yesBtn" onclick="openSite()">Yes 💖</button>
    <button class="btn no" id="noBtn" onclick="shrinkNo()">No 😢</button>

</div>

<div id="mainContent" class="hidden">

    <img src="ههههه" class="left-img">
    <img src="هههههههه" class="right-img">

    <div class="romantic" id="romanticText"></div>

    <div class="container">

        <h1>🎂 Happy Birthday ❤️</h1>

        <div id="countdown"></div>

        <button onclick="goBack()">🔙 Back</button>
        <button onclick="showSurprise()">Click for surprise 🎁</button>

        <p id="extra" style="display:none;">
        💖 كل سنة و انت طيبة يا ام لولى وربنا يخليكى ليا و ميحرمنيش منك ابدا و ان شاء الله السنة دى تكون سعيده عليكى يا حبيبتى و تفرحى فيها و تنولى كل اللى بتتمنية💖
        </p>

        <div class="media-box">
            <iframe id="musicFrame" width="300" height="170"></iframe>
            <img src="imge/gif.jpg" class="bottom-img">
        </div>

    </div>
</div>

<script>
let scale = 1;

function shrinkNo(){
    scale += 0.3;
    document.getElementById("yesBtn").style.transform = `scale(${scale})`;
    let noBtn = document.getElementById("noBtn");
    noBtn.style.transform = `scale(${1/scale})`;
    if(scale > 3){
        noBtn.style.display = "none";
    }
}

// ✅ التعديل هنا
function openSite(){
    let now = new Date().getTime();

    if(now < birthday){
        alert("أستنى حبة يا أوزتى 😄❤️");
        return;
    }

    document.getElementById("questionBox").style.display = "none";
    document.getElementById("mainContent").classList.remove("hidden");

    document.getElementById("musicFrame").src =
    "https://www.youtube.com/embed/UZW5iYrfAQ8?autoplay=1";
}

function goBack(){
    document.getElementById("questionBox").style.display = "block";
    document.getElementById("mainContent").classList.add("hidden");
    document.getElementById("musicFrame").src = "";
}

let text = "The most beautiful one just turned 19 ❤️";
let i = 0;
function typeWriter() {
    if (i < text.length) {
        document.getElementById("romanticText").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeWriter, 70);
    }
}
typeWriter();

let birthday = new Date("2026-04-01 00:00:00").getTime();
let fired = false;

setInterval(() => {
    let now = new Date().getTime();
    let diff = birthday - now;

    let d = Math.floor(diff/(1000*60*60*24));
    let h = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
    let m = Math.floor((diff%(1000*60*60))/(1000*60));
    let s = Math.floor((diff%(1000*60))/1000);

    if(diff <= 0){
        document.getElementById("countdown").innerHTML = "🎉 Time's Up 🎉";

        if(!fired){
            fired = true;
            setInterval(launchFireworks, 500);
        }
    } else {
        document.getElementById("countdown").innerHTML =
        `⏳ ${d}d ${h}h ${m}m ${s}s`;
    }

},1000);

function launchFireworks(){
    for(let i = 0; i < 15; i++){
        let fw = document.createElement("div");
        fw.className = "firework";
        fw.style.left = (Math.random() > 0.5 ? 0 : 100) + "vw";
        fw.style.top = Math.random() * 100 + "vh";
        document.body.appendChild(fw);
        setTimeout(()=> fw.remove(), 1000);
    }
}

setInterval(()=>{
    let heart = document.createElement("div");
    heart.className="heart";
    heart.innerHTML="❤️";
    heart.style.left=Math.random()*100+"vw";
    document.body.appendChild(heart);
    setTimeout(()=>heart.remove(),5000);
},300);

function showSurprise(){
    document.getElementById("extra").style.display="block";
}
</script>

</body>
</html>
